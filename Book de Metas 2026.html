<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Burger — Book Metas 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--g:#1D9E75;--gd:#0f6e4e;--gl:#e8f7f1;
--bg:#f7f8fa;--card:#fff;--bdr:#e2e5e9;
--t1:#1a1d21;--t2:#5a6068;--t3:#8b929a;
--red:#dc3545;--grn:#1D9E75;--amb:#e67e22;
--r:10px;--sh:0 1px 3px rgba(0,0,0,.05);
}
html{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--t1);font-size:13px}
body{min-height:100vh}
input,select,textarea,button{font-family:inherit;font-size:inherit}

/* LOGIN */
.lw{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px;background:linear-gradient(135deg,#f0faf6,#d0f0e4)}
.lx{background:#fff;border-radius:20px;padding:44px 36px;max-width:400px;width:100%;box-shadow:0 10px 30px rgba(0,0,0,.08);text-align:center}
.lx h1{font-size:26px;font-weight:700;color:var(--gd);margin-bottom:4px}
.lx p{color:var(--t2);margin-bottom:28px;font-size:14px}
.lc{width:72px;height:72px;background:var(--g);border-radius:50%;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;font-size:32px;color:#fff;font-weight:700}
.ll{display:flex;flex-direction:column;gap:6px;max-height:380px;overflow-y:auto}
.lb{display:flex;align-items:center;gap:10px;padding:12px 14px;border:1.5px solid var(--bdr);border-radius:var(--r);background:#fff;cursor:pointer;transition:all .15s;text-align:left;width:100%}
.lb:hover{border-color:var(--g);background:var(--gl)}
.lb .av{width:36px;height:36px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0}
.lb .nm{font-weight:600;font-size:13px}.lb .ar{font-size:11px;color:var(--t3)}
.lb.adm{border-color:var(--g);background:var(--gl)}.lb.adm .av{background:var(--gd)}
.dvd{height:1px;background:var(--bdr);margin:12px 0}

/* APP */
.aw{display:none;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-size:18px;font-weight:700;color:var(--gd)}.brand b{color:var(--g)}
.tr{display:flex;align-items:center;gap:10px}
.up{display:flex;align-items:center;gap:6px;padding:4px 12px 4px 4px;background:var(--gl);border-radius:999px;font-size:12px;font-weight:500;color:var(--gd)}
.up .ud{width:24px;height:24px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:10px}
.lo{padding:5px 12px;border-radius:6px;border:1px solid var(--bdr);background:#fff;cursor:pointer;font-size:12px;color:var(--t2)}.lo:hover{border-color:var(--red);color:var(--red)}
.cnt{max-width:1400px;margin:0 auto;padding:20px}

/* TABS */
.tabs{display:flex;gap:4px;margin-bottom:20px;flex-wrap:wrap}
.tb{padding:6px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1.5px solid var(--bdr);background:#fff;cursor:pointer;color:var(--t2)}
.tb:hover{border-color:var(--g);color:var(--g)}
.tb.on{background:var(--g);color:#fff;border-color:var(--g)}

/* HEADER */
.mhdr h2{font-size:20px;font-weight:700;margin-bottom:4px}
.abg{display:inline-block;padding:3px 10px;border-radius:999px;background:var(--gl);color:var(--gd);font-size:11px;font-weight:600}
.srow{display:flex;gap:12px;margin:14px 0 20px;flex-wrap:wrap}
.sc{flex:1;min-width:130px;padding:14px 16px;border-radius:var(--r);background:#fff;border:1px solid var(--bdr);box-shadow:var(--sh)}
.sc .sl{font-size:10px;text-transform:uppercase;letter-spacing:.5px;color:var(--t3);font-weight:600;margin-bottom:3px}
.sc .sv{font-size:22px;font-weight:700;color:var(--gd)}
.sc .sv.w{color:var(--amb)}.sc .sv.b{color:var(--red)}.sc .sv.ok{color:var(--grn)}

/* META CARD */
.mc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);box-shadow:var(--sh);margin-bottom:16px;overflow:hidden}
.mtp{padding:16px 18px;border-bottom:1px solid var(--bdr)}
.mtp-row1{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mbg{padding:2px 8px;border-radius:999px;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.mbg.m1{background:var(--g)}.mbg.m2{background:#3498db}.mbg.m3{background:var(--amb)}
.mtp .tit-in{flex:1;min-width:200px;border:none;border-bottom:1px dashed var(--bdr);padding:4px 0;font-size:15px;font-weight:700;background:transparent;color:var(--t1)}
.mtp .tit-in:focus{outline:none;border-color:var(--g)}
.mtp .ma-lbl{font-size:11px;color:var(--t3);margin-left:auto;white-space:nowrap}
.mtp .ma-val{font-weight:700;color:var(--gd);font-size:14px}
.mtp-row2{margin-top:8px}
.mtp .det-in{width:100%;border:none;border-bottom:1px dashed var(--bdr);padding:3px 0;font-size:12px;color:var(--t2);background:transparent;resize:none}
.mtp .det-in:focus{outline:none;border-color:var(--g)}
.mtp-row3{display:flex;gap:12px;margin-top:10px;flex-wrap:wrap;align-items:center}
.fg{display:flex;flex-direction:column;gap:2px}
.fg label{font-size:10px;text-transform:uppercase;letter-spacing:.4px;color:var(--t3);font-weight:600}
.fg input,.fg select{padding:4px 8px;border:1px solid var(--bdr);border-radius:6px;font-size:12px;background:#fff;color:var(--t1);min-width:70px}
.fg input:focus,.fg select:focus{outline:none;border-color:var(--g)}
.fg input[type=number]{width:60px;text-align:center}
/* Racional toggle */
.rac-toggle{font-size:11px;color:var(--g);cursor:pointer;font-weight:600;display:flex;align-items:center;gap:4px;margin-top:8px;user-select:none}
.rac-box{margin-top:6px;display:none}
.rac-box.open{display:block}
.rac-box textarea{width:100%;min-height:60px;border:1px solid var(--bdr);border-radius:6px;padding:8px;font-size:12px;color:var(--t2);resize:vertical;background:#fafbfc}
.rac-box textarea:focus{outline:none;border-color:var(--g)}

/* TABLE - COMPACT */
.tw{overflow-x:visible}
table{width:100%;border-collapse:collapse;font-size:11px;table-layout:fixed}
thead th{background:#f5f7f9;padding:6px 2px;text-align:center;font-weight:600;color:var(--t3);font-size:10px;text-transform:uppercase;letter-spacing:.3px;border-top:1px solid var(--bdr);white-space:nowrap}
thead th:first-child{text-align:left;padding-left:14px;width:70px}
thead th.ytd-th{background:#eef6f2;color:var(--gd);font-weight:700}
tbody td{padding:5px 2px;text-align:center;border-top:1px solid var(--bdr);font-size:11px}
tbody td:first-child{text-align:left;padding-left:14px;font-weight:600;color:var(--t2);font-size:11px}
.rp td{color:var(--t3)}
.rr td{font-weight:500}
.rp-ed td input,.rp-ed td select{font-size:11px;color:var(--t3)}
.rr input,.rp-ed input{width:100%;max-width:62px;padding:4px 2px;border:1px solid var(--bdr);border-radius:5px;font-size:11px;text-align:center;background:#fff}
.rr input:focus{outline:none;border-color:var(--g);box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.ytd-td{font-weight:700!important;background:#f4faf7}
.cok{color:#0a7b4f!important;font-weight:700}.cbd{color:#c0392b!important;font-weight:700}
.bg-ok{background:rgba(16,185,100,.18)!important;color:#0a7b4f;font-weight:600}.bg-bd{background:rgba(220,53,69,.15)!important;color:#c0392b;font-weight:600}

/* SAVE */
.svb{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--bdr);padding:10px 20px;display:flex;align-items:center;justify-content:center;gap:12px;z-index:200;transform:translateY(100%);transition:transform .3s;box-shadow:0 -4px 16px rgba(0,0,0,.06)}
.svb.show{transform:translateY(0)}
.svb button{padding:8px 28px;border-radius:var(--r);background:var(--g);color:#fff;border:none;font-size:13px;font-weight:600;cursor:pointer}.svb button:hover{background:var(--gd)}
.svb span{font-size:12px;color:var(--t2)}

/* OV GRID */
.og{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:12px}
.oc{background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:16px;box-shadow:var(--sh);cursor:pointer;transition:all .15s}
.oc:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(0,0,0,.07);border-color:var(--g)}
.oc .oh{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.oc .oa{width:40px;height:40px;border-radius:50%;background:var(--g);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:14px}
.oc .on{font-weight:700;font-size:14px}.oc .oi{font-size:11px;color:var(--t3)}
.oc .ov-score{margin-left:auto;font-size:20px;font-weight:700}
.om{display:flex;flex-direction:column;gap:6px}
.or{display:flex;align-items:center;gap:6px;font-size:12px}
.or .ob2{width:24px;height:18px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:700;color:#fff;flex-shrink:0}
.or .ob2.m1{background:var(--g)}.or .ob2.m2{background:#3498db}.or .ob2.m3{background:var(--amb)}
.or .ot{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--t2)}
.or .op{font-weight:700;min-width:44px;text-align:right}
.obr{height:3px;border-radius:2px;background:var(--bdr);overflow:hidden;margin-top:2px}
.obr div{height:100%;border-radius:2px}

/* TOAST */
.tst{position:fixed;top:20px;right:20px;padding:12px 20px;border-radius:var(--r);color:#fff;font-weight:500;font-size:13px;z-index:999;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.tst.show{opacity:1;transform:translateY(0)}.tst.ok{background:var(--g)}.tst.er{background:var(--red)}

@media(max-width:768px){.cnt{padding:12px}.og{grid-template-columns:1fr}.mtp-row3{gap:8px}}
</style>
</head>

function uploadFoto(idx){
  var inp=document.createElement('input');
  inp.type='file';inp.accept='image/*';
  inp.onchange=function(){
    var file=inp.files[0];if(!file)return;
    var reader=new FileReader();
    reader.onload=function(e){
      // Resize to max 120px to keep localStorage small
      var img=new Image();
      img.onload=function(){
        var canvas=document.createElement('canvas');
        var max=120;var w=img.width,h2=img.height;
        if(w>h2){h2=h2*(max/w);w=max;}else{w=w*(max/h2);h2=max;}
        canvas.width=w;canvas.height=h2;
        canvas.getContext('2d').drawImage(img,0,0,w,h2);
        ST[idx].foto=canvas.toDataURL('image/jpeg',0.8);
        markDirty();render();
      };
      img.src=e.target.result;
    };
    reader.readAsDataURL(file);
  };
  inp.click();
}

// HELPERS
function slug(s){return s.normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();}
function ini(s){return s.split(' ').map(function(w){return w[0]}).filter(Boolean).slice(0,2).join('').toUpperCase();}
function fv(v,u,dec){
  if(v==null||v==='')return'\u2014';
  if(typeof v==='string')return v;
  var d=dec!=null?dec:2;
  if(u==='R$'){
    var parts=Math.abs(v).toFixed(d).split('.');
    var intPart=parts[0].replace(/\B(?=(\d{3})+(?!\d))/g,'.');
    var result='R$ '+(v<0?'-':'')+intPart;
    if(d>0)result+=','+parts[1];
    return result;
  }
  if(u==='%')return v.toFixed(d)+'%';
  return typeof v==='number'?v.toFixed(d):String(v);
}
function fi(v){return v==null?'':String(v);}
function parseVal(v,u,ref){
  v=v.trim();
  if(v===''||v==='\u2014')return null;
  if(u==='S/N')return v;
  v=v.replace('R$','').replace('%','').replace(/\s/g,'');
  // Handle Brazilian format: 25.000,50 -> 25000.50
  if(u==='R$'&&v.indexOf('.')>=0&&v.indexOf(',')>=0){
    v=v.replace(/\./g,'').replace(',','.');
  }else if(u==='R$'&&v.indexOf(',')>=0&&v.indexOf('.')<0){
    v=v.replace(',','.');
  }else{
    v=v.replace(',','.');
  }
  var n=parseFloat(v);
  if(isNaN(n))return v;
  return n;
}

// Is meta being hit? true=green, false=red, null=no data
function isHit(prev,real,dir){
  if(prev==null||real==null||typeof prev!=='number'||typeof real!=='number')return null;
  if(dir==='Sim/Não')return real===prev?true:false;
  var low=dir&&dir.toLowerCase().indexOf('menor')>=0;
  if(low)return real<=prev;
  return real>=prev;
}
// % Atingimento calculation
function atingPct(prev,real,dir){
  if(prev==null||real==null||typeof prev!=='number'||typeof real!=='number')return null;
  if(prev===0)return real===0?100:(real>0?200:0);
  var isLow=dir&&dir.toLowerCase().indexOf('menor')>=0;
  if(isLow){
    // Menor melhor: if target is 5 and real is 4, that's 125% (better)
    // prev/real * 100 = 5/4 * 100 = 125%
    if(real===0)return 200;
    return Math.abs(prev/real)*100;
  }
  return(real/prev)*100;
}
// Traffic light: >100=green, 90-100=amber, <90=red
function trafficCl(pct){
  if(pct==null)return{cl:'',bg:'',icon:'\u2014',color:'var(--t3)'};
  if(pct>=100)return{cl:'cok',bg:'rgba(16,185,100,.15)',icon:'\u2705',color:'#0a7b4f'};
  if(pct>=90)return{cl:'',bg:'rgba(230,126,34,.12)',icon:'\u26A0\uFE0F',color:'#e67e22'};
  return{cl:'cbd',bg:'rgba(220,53,69,.12)',icon:'\u274C',color:'#c0392b'};
}
// YTD atingimento %
function ytdAting(mt){
  var target=mt.ytd_prev!=null?mt.ytd_prev:mt.meta_anual;
  var actual=mt.ytd_real;
  return atingPct(target,actual,mt.direcao);
}
function ytdHit(mt){
  var target=mt.ytd_prev!=null?mt.ytd_prev:mt.meta_anual;
  var actual=mt.ytd_real;
  if(target==null||actual==null)return null;
  if(typeof target!=='number'||typeof actual!=='number')return null;
  return isHit(target,actual,mt.direcao);
}
// Weighted score for gestor: sum of peso where YTD is hit
function gestorScore(mgr){
  var score=0,possible=0,hasData=false;
  mgr.metas.forEach(function(mt){
    var p=mt.peso||0;possible+=p;
    var h=ytdHit(mt);
    if(h!==null){hasData=true;if(h)score+=p;}
  });
  return hasData?{score:score,possible:possible}:null;
}

    return{id:mt.id,r:mt.realizado,p:mt.previsto,peso:mt.peso,nome:mt.nome,objetivo:mt.objetivo,unidade:mt.unidade,direcao:mt.direcao,fonte:mt.fonte,racional:mt.racional,meta_anual:mt.meta_anual,ytd_real:mt.ytd_real,ytd_prev:mt.ytd_prev,decimais:mt.decimais};
  })};
}

function applyGestorPayload(idx,d){
  if(!d)return;
  var m=ST[idx];
  if(d.nome)m.nome=d.nome;
  if(d.area!=null)m.area=d.area;
  if(d.foto!==undefined)m.foto=d.foto;
  if(d.metas){
    d.metas.forEach(function(sv,i){
      if(!sv||!m.metas[i])return;
      var mt=m.metas[i];
      if(sv.r)mt.realizado=sv.r;if(sv.p)mt.previsto=sv.p;
      if(sv.peso!=null)mt.peso=sv.peso;if(sv.nome!=null)mt.nome=sv.nome;
      if(sv.objetivo!=null)mt.objetivo=sv.objetivo;if(sv.unidade)mt.unidade=sv.unidade;
      if(sv.direcao)mt.direcao=sv.direcao;if(sv.fonte!=null)mt.fonte=sv.fonte;
      if(sv.racional!=null)mt.racional=sv.racional;
      if(sv.meta_anual!=null)mt.meta_anual=sv.meta_anual;
      if(sv.ytd_real!=null)mt.ytd_real=sv.ytd_real;
      if(sv.ytd_prev!=null)mt.ytd_prev=sv.ytd_prev;
      if(sv.decimais!=null)mt.decimais=sv.decimais;
    });
  }
}

            {id:'M2',peso:30,nome:'',objetivo:'',unidade:'%',direcao:'Maior Melhor',fonte:'',racional:'',meta_anual:null,ytd_real:null,ytd_prev:null,decimais:2,previsto:[null,null,null,null,null,null,null,null,null,null,null,null],realizado:[null,null,null,null,null,null,null,null,null,null,null,null]},
            {id:'M3',peso:30,nome:'',objetivo:'',unidade:'%',direcao:'Maior Melhor',fonte:'',racional:'',meta_anual:null,ytd_real:null,ytd_prev:null,decimais:2,previsto:[null,null,null,null,null,null,null,null,null,null,null,null],realizado:[null,null,null,null,null,null,null,null,null,null,null,null]}
          ]};

        existing.nome=p.nome;existing.area=p.area;if(p.foto)existing.foto=p.foto;
        newST.push(existing);
      });

    ST.forEach(function(m,i){

function saveLocal(){
  var d=ST.map(function(m,i){return buildGestorPayload(i);});
  localStorage.setItem('cabana_metas_v5',JSON.stringify(d));
}

// Save a single gestor to Supabase
function saveGestor(idx){
  var m=ST[idx];
  var k=slug(m.nome);
  var d=buildGestorPayload(idx);
  saveLocal();
  if(!sb){toast('Salvo localmente (sem conexão)',false);return Promise.resolve();}
  return sb.from('book_metas_gestores').upsert({chave:k,dados:d,updated_at:new Date().toISOString()},{onConflict:'chave'}).then(function(res){
    if(res.error){toast('ERRO ao salvar '+m.nome+': '+res.error.message,false);return false;}
    return true;
  }).catch(function(e){toast('ERRO de conexão',false);return false;});
}

// Save config (people list) + specific gestor
function saveConfig(){
  var cfg={_people:ST.map(function(m){return{nome:m.nome,area:m.area,foto:m.foto||null};})};
  saveLocal();
  if(!sb)return;
  return sb.from('book_metas_gestores').upsert({chave:'_config',dados:cfg,updated_at:new Date().toISOString()},{onConflict:'chave'});
}

// Save everything (all gestores + config)
function saveAll(){
  saveLocal();
  if(!sb){toast('Salvo localmente (sem conexão)',false);return;}
  var promises=[];
  // Save config
  promises.push(saveConfig());
  // Save each gestor individually
  ST.forEach(function(m,i){
    var k=slug(m.nome);
    var d=buildGestorPayload(i);
    promises.push(sb.from('book_metas_gestores').upsert({chave:k,dados:d,updated_at:new Date().toISOString()},{onConflict:'chave'}));
  });
  Promise.all(promises).then(function(results){
    var errors=results.filter(function(r){return r&&r.error;});
    if(errors.length>0){
      toast('ERRO ao salvar: '+errors[0].error.message,false);
    }else{
      toast('Dados salvos no servidor!');
    }
  }).catch(function(e){toast('ERRO de conexão ao salvar',false);});
}

// Auto-refresh: reload data from Supabase every 30 seconds
var _refreshTimer=null;
function startAutoRefresh(){
  if(_refreshTimer)clearInterval(_refreshTimer);
  _refreshTimer=setInterval(function(){
    if(!sb||dirty)return; // Don't overwrite unsaved changes
    sb.from('book_metas_gestores').select('*').then(function(res){
      if(res.error||!res.data)return;
      var gestorRows={};
      res.data.forEach(function(row){
        if(row.chave!=='_config')gestorRows[row.chave]=row.dados;
      });
      var changed=false;
      ST.forEach(function(m,i){
        var k=slug(m.nome);
        if(gestorRows[k]){
          var old=JSON.stringify(buildGestorPayload(i));
          applyGestorPayload(i,gestorRows[k]);
          var nw=JSON.stringify(buildGestorPayload(i));
          if(old!==nw)changed=true;
        }
      });
      if(changed){
        saveLocal();
        if(CU)render();
      }
    });
  },30000);
}

function renderRec(){
  var ac=document.getElementById('AC');
  // Determine current month (last month with any realizado data across all)
  var curMonth=0;
  ST.forEach(function(m){m.metas.forEach(function(mt){mt.realizado.forEach(function(v,i){if(v!=null&&i>=curMonth)curMonth=i;});});});
  var mesNome=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];

  // Calc stats for each gestor
  var stats=ST.map(function(m,idx){
    var gs=gestorScore(m);
    var nota=gs?gs.score:null;

    // Metas at 100%+
    var metas100=[];
    m.metas.forEach(function(mt){var a=ytdAting(mt);if(a!=null&&a>=100)metas100.push(mt);});

    // Consistency: consecutive green months (all metas >= 90% in that month)
    var streak=0,maxStreak=0,streakMonths=[];
    for(var i=0;i<=curMonth;i++){
      var allGreen=true,hasData=false;
      m.metas.forEach(function(mt){
        var pct=atingPct(mt.previsto[i],mt.realizado[i],mt.direcao);
        if(pct!=null){hasData=true;if(pct<90)allGreen=false;}
      });
      if(hasData&&allGreen){streak++;streakMonths.push(i);}
      else{if(streak>maxStreak)maxStreak=streak;streak=0;}
    }
    if(streak>maxStreak)maxStreak=streak;

    // Current streak (from curMonth backwards)
    var curStreak=0;
    for(var i=curMonth;i>=0;i--){
      var allG=true,hd=false;
      m.metas.forEach(function(mt){
        var pct=atingPct(mt.previsto[i],mt.realizado[i],mt.direcao);
        if(pct!=null){hd=true;if(pct<90)allG=false;}
      });
      if(hd&&allG)curStreak++;else break;
    }

    // Monthly evolution: compare curMonth vs curMonth-1
    var evol=null;
    if(curMonth>0){
      var prevWtd=0,prevTot=0,curWtd2=0,curTot2=0;
      m.metas.forEach(function(mt){
        var pPrev=atingPct(mt.previsto[curMonth-1],mt.realizado[curMonth-1],mt.direcao);
        var pCur=atingPct(mt.previsto[curMonth],mt.realizado[curMonth],mt.direcao);
        if(pPrev!=null){prevWtd+=pPrev*(mt.peso||0);prevTot+=(mt.peso||0);}
        if(pCur!=null){curWtd2+=pCur*(mt.peso||0);curTot2+=(mt.peso||0);}
      });
      var prevAvg=prevTot>0?(prevWtd/prevTot):null;
      var curAvg=curTot2>0?(curWtd2/curTot2):null;
      if(prevAvg!=null&&curAvg!=null)evol=curAvg-prevAvg;
    }

    // Preenchimento: months filled out of possible
    var filled=0,possible=0;
    m.metas.forEach(function(mt){
      for(var i=0;i<=curMonth;i++){
        if(mt.previsto[i]!=null)possible++;
        if(mt.realizado[i]!=null)filled++;
      }
    });

    // Recovery: was red last month, now yellow/green
    var recovered=false;
    if(curMonth>0){
      var wasRed=false,nowOk=false;
      m.metas.forEach(function(mt){
        var pPrev=atingPct(mt.previsto[curMonth-1],mt.realizado[curMonth-1],mt.direcao);
        var pCur=atingPct(mt.previsto[curMonth],mt.realizado[curMonth],mt.direcao);
        if(pPrev!=null&&pPrev<90)wasRed=true;
        if(pCur!=null&&pCur>=90)nowOk=true;
      });
      recovered=wasRed&&nowOk;
    }

    return{idx:idx,nome:m.nome,area:m.area,nota:nota,metas100:metas100,maxStreak:maxStreak,curStreak:curStreak,evol:evol,filled:filled,possible:possible,recovered:recovered};
  });

  // Sort by YTD ponderado desc for destaque
  var ranked=stats.filter(function(s){return s.nota!=null}).sort(function(a,b){return b.nota-a.nota});
  var best=ranked[0]||null;

  // Badges
  var badge100=stats.filter(function(s){return s.metas100.length>0}).sort(function(a,b){return b.metas100.length-a.metas100.length})[0];
  var badgeEvol=stats.filter(function(s){return s.evol!=null&&s.evol>0}).sort(function(a,b){return b.evol-a.evol})[0];
  var badgeFill=stats.filter(function(s){return s.possible>0}).sort(function(a,b){return(b.filled/b.possible)-(a.filled/a.possible)})[0];
  var badgeRecov=stats.filter(function(s){return s.recovered})[0];

  // Consistency ranking
  var consistency=stats.filter(function(s){return s.curStreak>0}).sort(function(a,b){return b.curStreak-a.curStreak});

  var h='';
  // Header
  h+='<div style="margin-bottom:24px"><h2 style="font-size:20px;font-weight:700">Painel de Reconhecimento \u2014 '+mesNome[curMonth]+' 2026</h2>';
  h+='<p style="color:var(--t2);font-size:13px;margin-top:2px">Celebrando consistência, evolução e resultados do mês</p></div>';

  // DESTAQUE DO MÊS
  if(best){
    var bestStreakTxt=best.curStreak>0?best.curStreak+' meses consecutivos no verde':'';
    h+='<div style="background:linear-gradient(135deg,#e8f7f1,#d4edda);border:1.5px solid #b7e4c7;border-radius:14px;padding:24px;margin-bottom:24px;display:flex;align-items:center;gap:20px;flex-wrap:wrap">';
    h+='<div style="font-size:40px">\u{1F3C6}</div>';
    h+='<div style="flex:1;min-width:200px"><div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;color:var(--g);font-weight:700;margin-bottom:4px">Destaque do Mês</div>';
    h+='<div style="font-size:22px;font-weight:700;color:var(--t1)">'+best.nome+'</div>';
    h+='<div style="font-size:13px;color:var(--gd)">'+best.area+(bestStreakTxt?' \u00B7 '+bestStreakTxt:'')+'</div>';
    h+='<div style="font-size:12px;color:var(--t2);margin-top:4px">Melhor atingimento ponderado, com '+best.metas100.length+' meta'+(best.metas100.length!==1?'s':'')+' acima de 100%.</div>';
    h+='</div>';
    h+='<div style="text-align:right"><div style="font-size:36px;font-weight:700;color:var(--gd)">'+best.nota+'%</div><div style="font-size:11px;color:var(--t3)">Nota</div></div>';
    h+='</div>';
  }

  // BADGES DO MÊS
  h+='<div style="font-size:12px;font-weight:700;color:var(--t3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px">Badges do mês</div>';
  h+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px;margin-bottom:24px">';
  if(badge100){
    h+='<div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px;display:flex;gap:10px;align-items:center"><div style="font-size:24px">\u2B50</div><div><div style="font-weight:700;font-size:12px">Meta 100% batida</div><div style="font-weight:600;font-size:13px">'+badge100.nome+'</div><div style="font-size:11px;color:var(--t3)">'+badge100.metas100.map(function(m){return m.id}).join(', ')+' atingida'+(badge100.metas100.length>1?'s':'')+' em 100%</div></div></div>';
  }
  if(badgeEvol){
    h+='<div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px;display:flex;gap:10px;align-items:center"><div style="font-size:24px">\u{1F4C8}</div><div><div style="font-weight:700;font-size:12px">Maior evolução do mês</div><div style="font-weight:600;font-size:13px">'+badgeEvol.nome+'</div><div style="font-size:11px;color:var(--t3)">+'+badgeEvol.evol.toFixed(0)+'pp de melhora vs. '+(curMonth>0?MO[curMonth-1]:'')+'</div></div></div>';
  }
  if(badgeFill&&badgeFill.possible>0&&badgeFill.filled===badgeFill.possible){
    h+='<div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:14px;display:flex;gap:10px;align-items:center"><div style="font-size:24px">\u2705</div><div><div style="font-weight:700;font-size:12px">Preenchimento perfeito</div><div style="font-weight:600;font-size:13px">'+badgeFill.nome+'</div><div style="font-size:11px;color:var(--t3)">'+badgeFill.filled+'/'+badgeFill.possible+' meses preenchidos em dia</div></div></div>';
  }

      h+='<div style="background:#fff;border:1px solid var(--bdr);border-radius:var(--r);padding:12px 16px;display:flex;align-items:center;gap:12px">';
      h+=''+avHTML(ST[s.idx],36,13);
      h+='<div style="min-width:120px"><div style="font-weight:700;font-size:13px">'+s.nome+'</div><div style="font-size:11px;color:var(--t3)">'+s.area+'</div></div>';
      // Monthly dots
      h+='<div style="display:flex;gap:3px;flex:1;flex-wrap:wrap">';

        ST[s.idx].metas.forEach(function(mt){
          var pct=atingPct(mt.previsto[i],mt.realizado[i],mt.direcao);

        });

    h+='<div style="flex:1;min-width:100px"><div style="font-weight:600;font-size:13px">'+s.nome+'</div><div style="font-size:11px;color:var(--t3)">'+s.area+'</div></div>';

}

  h+='</div><div class="srow">';

  var scTxt=gs?(gs.score+' / '+gs.possible+'%'):'\u2014';

    h+='</div>';
  });
  h+='</div></div>';
  m.metas.forEach(function(mt,mi){h+=renderMeta(idx,mi);});
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-top:12px;flex-wrap:wrap;gap:8px">';

}

  h+='<td class="ytd-td" style="font-size:14px">'+ytdTl.icon+'</td></tr>';

function esc(s){return String(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

// Update atingimento/status/colors inline without destroying DOM
function updateMetaDisplay(gi,mi){
  var mt=ST[gi].metas[mi];
  var dec=mt.decimais!=null?mt.decimais:2;
  // Update % Atingimento row
  var atingRow=document.getElementById('ating-'+gi+'-'+mi);
  if(atingRow){
    var cells=atingRow.querySelectorAll('td');
    for(var i=0;i<12;i++){
      var pct=atingPct(mt.previsto[i],mt.realizado[i],mt.direcao);
      var tl=trafficCl(pct);
      if(cells[i+1]){
        cells[i+1].style.background=tl.bg;
        cells[i+1].style.color=tl.color;
        cells[i+1].style.fontWeight='700';
        cells[i+1].textContent=pct!=null?pct.toFixed(0)+'%':'\u2014';
      }
    }
    // YTD cell
    var ytdPct=ytdAting(mt);
    var ytdTl=trafficCl(ytdPct);
    if(cells[13]){
      cells[13].style.background=ytdTl.bg;
      cells[13].style.color=ytdTl.color;
      cells[13].textContent=ytdPct!=null?ytdPct.toFixed(0)+'%':'\u2014';
    }
  }
  // Update Status row
  var statusRow=document.getElementById('status-'+gi+'-'+mi);
  if(statusRow){
    var scells=statusRow.querySelectorAll('td');
    for(var i=0;i<12;i++){
      var pct2=atingPct(mt.previsto[i],mt.realizado[i],mt.direcao);
      var tl2=trafficCl(pct2);
      if(scells[i+1])scells[i+1].textContent=tl2.icon;
    }
    var ytdPct2=ytdAting(mt);
    var ytdTl2=trafficCl(ytdPct2);
    if(scells[13])scells[13].textContent=ytdTl2.icon;
  }
  // Update realizado cell backgrounds
  var card=document.querySelector('.mc[data-gi="'+gi+'"][data-mi="'+mi+'"]');
  if(card){
    card.querySelectorAll('[data-ri]').forEach(function(el){
      var ri=parseInt(el.getAttribute('data-ri'));
      var hit=isHit(mt.previsto[ri],mt.realizado[ri],mt.direcao);
      var td=el.closest('td');
      if(td){
        td.className=hit===null?'':(hit?'bg-ok':'bg-bd');
      }
    });
  }
  // Update header score cards
  updateHeaderScores(gi);
}

function updateHeaderScores(gi){
  var m=ST[gi];
  var gs=gestorScore(m);
  // Find the score cards in srow
  var srow=document.querySelector('.srow');
  if(!srow)return;
  var cards=srow.querySelectorAll('.sc');
  if(cards[0]){
    var scTxt=gs?(gs.score+' / '+gs.possible+'%'):'\u2014';
    cards[0].querySelector('.sv').textContent=scTxt;
  }
  m.metas.forEach(function(mt,i){
    if(cards[i+1]){
      var a=ytdAting(mt);
      var tl=trafficCl(a);
      var yh=ytdHit(mt);
      cards[i+1].style.background=a===null?'transparent':tl.bg;
      var sv=cards[i+1].querySelector('.sv');
      if(sv){
        sv.style.color=tl.color;
        sv.textContent=a===null?'\u2014':(a>=100?'\u2705 Meta Batida':(a>=90?'\u26A0\uFE0F Atenção':'\u274C Não Batida'));
      }
    }
  });
}

function bindMeta(c,gIdx){
  c.querySelectorAll('.mc').forEach(function(card){
    var gi=parseInt(card.getAttribute('data-gi'));
    var mi=parseInt(card.getAttribute('data-mi'));
    var mt=ST[gi].metas[mi];
    card.querySelectorAll('[data-f]').forEach(function(el){
      var f=el.getAttribute('data-f');
      var ev=el.tagName==='SELECT'?'change':(el.tagName==='TEXTAREA'?'input':'change');
      el.addEventListener(ev,function(){
        if(f==='peso'){mt.peso=parseInt(this.value)||0;}
        else if(f==='decimais'){mt.decimais=parseInt(this.value);markDirty();renderMgr(document.getElementById(CU.isAdmin?'AC':'CT'),gi);return;}
        else if(f==='unidade'){mt.unidade=this.value;markDirty();renderMgr(document.getElementById(CU.isAdmin?'AC':'CT'),gi);return;}
        else if(f==='meta_anual'){mt.meta_anual=parseVal(this.value,mt.unidade,null);markDirty();updateMetaDisplay(gi,mi);return;}
        else if(f==='ytd_real'){mt.ytd_real=parseVal(this.value,mt.unidade,null);markDirty();updateMetaDisplay(gi,mi);return;}
        else if(f==='ytd_prev'){mt.ytd_prev=parseVal(this.value,mt.unidade,null);markDirty();updateMetaDisplay(gi,mi);return;}
        else{mt[f]=this.value;}
        markDirty();
      });
    });
    card.querySelectorAll('[data-pi]').forEach(function(el){
      var pi=parseInt(el.getAttribute('data-pi'));
      el.addEventListener('change',function(){
        mt.previsto[pi]=parseVal(this.value,mt.unidade,mt.previsto[pi]);
        markDirty();
        updateMetaDisplay(gi,mi);
      });
    });
    card.querySelectorAll('.rr input[data-ri],.rr select[data-ri]').forEach(function(el){
      var ri=parseInt(el.getAttribute('data-ri'));
      el.addEventListener('change',function(){
        mt.realizado[ri]=parseVal(this.value,mt.unidade,mt.previsto[ri]);
        markDirty();
        updateMetaDisplay(gi,mi);
      });
    });
    card.querySelectorAll('.rac-toggle').forEach(function(tog){
      tog.addEventListener('click',function(){
        var id=this.getAttribute('data-rac');
        var box=document.getElementById('rac-'+id);
        var open=box.classList.toggle('open');
        this.innerHTML=(open?'\u25BC':'\u25B6')+' Racional da meta';
      });
    });
    // TAB navigation: column-by-column (Prev JAN -> Real JAN -> Prev FEV -> Real FEV -> ...)
    var prevInputs=Array.from(card.querySelectorAll('[data-pi]'));
    var realInputs=Array.from(card.querySelectorAll('[data-ri]'));
    var ytdPrev=card.querySelector('[data-f="ytd_prev"]');
    var ytdReal=card.querySelector('[data-f="ytd_real"]');
    var tabOrder=[];
    for(var ti=0;ti<12;ti++){
      if(prevInputs[ti])tabOrder.push(prevInputs[ti]);
      if(realInputs[ti])tabOrder.push(realInputs[ti]);
    }
    if(ytdPrev)tabOrder.push(ytdPrev);
    if(ytdReal)tabOrder.push(ytdReal);
    tabOrder.forEach(function(inp,idx2){
      inp.addEventListener('keydown',function(ev){
        if(ev.key==='Tab'){
          ev.preventDefault();
          // Trigger change to save current value
          inp.dispatchEvent(new Event('change'));
          var next;
          if(ev.shiftKey){
            next=idx2>0?tabOrder[idx2-1]:null;
          }else{
            next=idx2<tabOrder.length-1?tabOrder[idx2+1]:null;
          }
          if(next){
            setTimeout(function(){next.focus();next.select();},10);
          }
        }
      });
    });
  });
}

// PPTX GENERATION
function gerarSlide(idx){
  var m=ST[idx];
  var gs=gestorScore(m);
  var pres=new PptxGenJS();
  pres.layout='LAYOUT_16x9';
  pres.author='Cabana Burger';
  pres.title='Book Metas 2026 - '+m.nome;
  var slide=pres.addSlide();
  slide.background={color:'FFFFFF'};

  // Green header bar
  slide.addShape(pres.shapes.RECTANGLE,{x:0,y:0,w:10,h:0.7,fill:{color:'1D9E75'}});
  // Logo image
  var logoEl=document.querySelector('.topbar img');
  if(logoEl){slide.addImage({data:'image/jpeg;base64,'+logoEl.src.split(',')[1],x:0.25,y:0.08,w:0.55,h:0.55});}
  slide.addText('Book Metas 2026',{x:0.9,y:0.1,w:3,h:0.5,fontSize:13,fontFace:'Arial',color:'FFFFFF',bold:true});

  // Gestor info
  var scTxt=gs?gs.score+'/'+gs.possible+'%':'\u2014';
  var scColor=gs?(gs.score>=gs.possible?'1D9E75':'DC3545'):'888888';
  slide.addText(m.nome,{x:0.4,y:0.85,w:5,h:0.35,fontSize:18,fontFace:'Arial',color:'1a1d21',bold:true});
  slide.addText(m.area,{x:5.5,y:0.85,w:1.5,h:0.35,fontSize:11,fontFace:'Arial',color:'1D9E75',bold:true,align:'center',fill:{color:'e8f7f1'},shape:pres.shapes.ROUNDED_RECTANGLE,rectRadius:0.05});
  slide.addText('Atingimento: '+scTxt,{x:7.5,y:0.85,w:2.2,h:0.35,fontSize:13,fontFace:'Arial',color:scColor,bold:true,align:'right'});

  // Thin line
  slide.addShape(pres.shapes.LINE,{x:0.4,y:1.25,w:9.2,h:0,line:{color:'E2E5E9',width:1}});

  // Table for metas
  var months=['JAN','FEV','MAR','ABR','MAI','JUN','JUL','AGO','SET','OUT','NOV','DEZ'];
  var headerOpts={fill:{color:'F5F7F9'},color:'5a6068',fontSize:6,fontFace:'Arial',bold:true,align:'center',valign:'middle'};
  var cellOpts={fontSize:6.5,fontFace:'Arial',align:'center',valign:'middle',color:'1a1d21'};
  var metaY=1.35;

  m.metas.forEach(function(mt,mi){
    var dec=mt.decimais!=null?mt.decimais:2;
    var yh=ytdHit(mt);
    var statusTxt=yh===null?'':(yh?'META BATIDA':'NAO BATIDA');
    var statusClr=yh===null?'888888':(yh?'1D9E75':'DC3545');
    var badgeColors={M1:'1D9E75',M2:'3498db',M3:'e67e22'};
    var bc=badgeColors[mt.id]||'1D9E75';

    // Meta header row
    slide.addShape(pres.shapes.RECTANGLE,{x:0.4,y:metaY,w:0.35,h:0.22,fill:{color:bc}});
    slide.addText(mt.id,{x:0.4,y:metaY,w:0.35,h:0.22,fontSize:7,fontFace:'Arial',color:'FFFFFF',bold:true,align:'center',valign:'middle'});
    slide.addText(mt.nome||'(sem nome)',{x:0.8,y:metaY,w:4,h:0.22,fontSize:8,fontFace:'Arial',color:'1a1d21',bold:true,valign:'middle'});
    slide.addText('Peso: '+(mt.peso||0)+'%   |   Unidade: '+(mt.unidade||'-')+'   |   '+( mt.direcao||'-')+'   |   Fonte: '+(mt.fonte||'-'),{x:5,y:metaY,w:3.5,h:0.22,fontSize:6,fontFace:'Arial',color:'8b929a',valign:'middle'});
    if(statusTxt){slide.addText(statusTxt,{x:8.6,y:metaY,w:1.1,h:0.22,fontSize:7,fontFace:'Arial',color:statusClr,bold:true,align:'right',valign:'middle'});}
    slide.addText('Meta Ano: '+(mt.meta_anual!=null?fv(mt.meta_anual,mt.unidade,dec):'\u2014'),{x:0.8,y:metaY+0.22,w:3,h:0.18,fontSize:6,fontFace:'Arial',color:'0f6e4e',italic:true});
    if(mt.objetivo){slide.addText(mt.objetivo,{x:4,y:metaY+0.22,w:5.6,h:0.18,fontSize:5.5,fontFace:'Arial',color:'8b929a',italic:true});}

    // Build table rows
    var tblHeader=[{text:'',options:headerOpts}];
    months.forEach(function(mo){tblHeader.push({text:mo,options:headerOpts});});
    tblHeader.push({text:'YTD',options:Object.assign({},headerOpts,{fill:{color:'eef6f2'},color:'0f6e4e'})});

    var prevRow=[{text:'Prev.',options:Object.assign({},cellOpts,{color:'8b929a',bold:true,align:'left'})}];
    months.forEach(function(_,i){prevRow.push({text:mt.previsto[i]!=null?fv(mt.previsto[i],mt.unidade,dec):'\u2014',options:Object.assign({},cellOpts,{color:'8b929a'})});});
    prevRow.push({text:mt.ytd_prev!=null?fv(mt.ytd_prev,mt.unidade,dec):'\u2014',options:Object.assign({},cellOpts,{color:'8b929a',fill:{color:'f4faf7'}})});

    var realRow=[{text:'Real.',options:Object.assign({},cellOpts,{bold:true,align:'left'})}];
    months.forEach(function(_,i){
      var v=mt.realizado[i];
      var hit=isHit(mt.previsto[i],v,mt.direcao);
      var bg=hit===null?'FFFFFF':(hit?'d4edda':'f8d7da');
      var clr=hit===null?'1a1d21':(hit?'0a7b4f':'c0392b');
      realRow.push({text:v!=null?fv(v,mt.unidade,dec):'\u2014',options:Object.assign({},cellOpts,{fill:{color:bg},color:clr,bold:true})});
    });
    var ytdBg=yh===null?'f4faf7':(yh?'d4edda':'f8d7da');
    var ytdClr=yh===null?'1a1d21':(yh?'0a7b4f':'c0392b');
    realRow.push({text:mt.ytd_real!=null?fv(mt.ytd_real,mt.unidade,dec):'\u2014',options:Object.assign({},cellOpts,{fill:{color:ytdBg},color:ytdClr,bold:true})});

    var colW=[0.45];for(var ci=0;ci<12;ci++)colW.push(0.67);colW.push(0.72);

    slide.addTable([tblHeader,prevRow,realRow],{x:0.4,y:metaY+0.42,w:9.2,colW:colW,rowH:[0.2,0.2,0.2],border:{pt:0.5,color:'E2E5E9'},margin:[1,2,1,2]});
    metaY+=1.12;
  });

  // Bottom section: Pontos Positivos / Negativos
  var bottomY=4.65;
  slide.addShape(pres.shapes.LINE,{x:0.4,y:bottomY-0.05,w:9.2,h:0,line:{color:'E2E5E9',width:1}});

  // Positive
  slide.addShape(pres.shapes.RECTANGLE,{x:0.4,y:bottomY,w:4.5,h:0.85,fill:{color:'f0faf6'},line:{color:'d4edda',width:0.5}});
  slide.addText('Pontos Positivos',{x:0.55,y:bottomY+0.02,w:4,h:0.2,fontSize:8,fontFace:'Arial',color:'0a7b4f',bold:true});
  slide.addText('(preencher antes da reunião)',{x:0.55,y:bottomY+0.22,w:4.2,h:0.55,fontSize:7,fontFace:'Arial',color:'8b929a',italic:true,valign:'top'});

  // Negative
  slide.addShape(pres.shapes.RECTANGLE,{x:5.1,y:bottomY,w:4.5,h:0.85,fill:{color:'fef5f5'},line:{color:'f8d7da',width:0.5}});
  slide.addText('Riscos/Oportunidades',{x:5.25,y:bottomY+0.02,w:4,h:0.2,fontSize:8,fontFace:'Arial',color:'c0392b',bold:true});
  slide.addText('(preencher antes da reunião)',{x:5.25,y:bottomY+0.22,w:4.2,h:0.55,fontSize:7,fontFace:'Arial',color:'8b929a',italic:true,valign:'top'});

  pres.writeFile({fileName:'Metas_2026_'+m.nome.replace(/\s/g,'_')+'.pptx'}).then(function(){
    toast('Slide gerado com sucesso!');
  });
}

// Migrate old decimal % values to new format (multiply by 100)
// Only run if data looks like old format (% values < 2)
ST.forEach(function(m){m.metas.forEach(function(mt){
  if(mt.unidade==='%'){
    var needsMigration=false;
    mt.previsto.forEach(function(v){if(typeof v==='number'&&Math.abs(v)<2&&v!==0)needsMigration=true;});
    if(needsMigration){
      mt.previsto=mt.previsto.map(function(v){return typeof v==='number'?v*100:v;});
      mt.realizado=mt.realizado.map(function(v){return typeof v==='number'?v*100:v;});
      if(typeof mt.meta_anual==='number'&&Math.abs(mt.meta_anual)<2)mt.meta_anual=mt.meta_anual*100;
      if(typeof mt.ytd_real==='number'&&Math.abs(mt.ytd_real)<2)mt.ytd_real=mt.ytd_real*100;
      if(typeof mt.ytd_prev==='number'&&Math.abs(mt.ytd_prev)<2)mt.ytd_prev=mt.ytd_prev*100;
    }
  }
});});
