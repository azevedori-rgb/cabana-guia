<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Burger — Geografia das Lojas</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'DM Sans',system-ui,sans-serif;background:#f7f8fa;color:#1a1d21;overflow:hidden;font-size:13px}
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#fff;border-bottom:1px solid #e2e5e9;box-shadow:0 1px 3px rgba(0,0,0,.05);flex-shrink:0;z-index:100;position:sticky;top:0}
.logo{display:flex;align-items:center;gap:14px}
.logo img{height:32px}
.logo-divider{width:1px;height:24px;background:#e2e5e9}
.logo-title{font-size:13px;font-weight:500;color:#5a6068}
.topbar-center{display:flex;gap:4px;background:#f7f8fa;border-radius:999px;padding:3px}
.tab-btn{font-family:inherit;font-size:11px;font-weight:600;padding:6px 14px;border-radius:999px;border:1.5px solid transparent;background:transparent;color:#5a6068;cursor:pointer;transition:all .15s}
.tab-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.tab-btn:hover:not(.active){color:#0f6e4e;background:#e8f7f1}
.kpi-strip{display:flex;gap:28px}
.kpi{text-align:center;position:relative}
.kpi+.kpi::before{content:'';position:absolute;left:-14px;top:4px;bottom:4px;width:1px;background:#e2e5e9}
.kpi-val{font-size:22px;font-weight:700;color:#0f6e4e}
.kpi-label{font-size:10px;color:#8b929a;text-transform:uppercase;letter-spacing:.5px;font-weight:600;margin-top:1px}
.main-content{flex:1;overflow:hidden;position:relative}
.map-view{display:grid;grid-template-columns:360px 1fr;height:100%;position:absolute;inset:0;transition:opacity .2s}
.map-view.hidden{opacity:0;pointer-events:none}
.sidebar{background:#fff;border-right:1px solid #e2e5e9;display:flex;flex-direction:column;overflow:hidden}
.sidebar-head{padding:16px 20px 14px;border-bottom:1px solid #e2e5e9}
.sidebar-head h2{font-size:11px;font-weight:600;color:#8b929a;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.filters{display:flex;gap:5px;flex-wrap:wrap}
.fbtn{font-family:inherit;font-size:11px;padding:6px 14px;border-radius:999px;border:1.5px solid #e2e5e9;background:#fff;color:#5a6068;cursor:pointer;transition:all .15s;font-weight:500}
.fbtn:hover{background:#e8f7f1;color:#0f6e4e;border-color:#1D9E75}
.fbtn.active{background:#1D9E75;color:#fff;border-color:#1D9E75}
.search-box{margin-top:12px;position:relative}
.search-box input{width:100%;padding:8px 12px 8px 34px;border-radius:6px;border:1px solid #e2e5e9;background:#f7f8fa;color:#1a1d21;font-family:inherit;font-size:13px;outline:none;transition:all .15s}
.search-box input::placeholder{color:#8b929a}
.search-box input:focus{border-color:#1D9E75;background:#fff;box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);width:14px;height:14px;opacity:.35}
.store-list{flex:1;overflow-y:auto;padding:8px 12px}
.store-list::-webkit-scrollbar{width:5px}
.store-list::-webkit-scrollbar-thumb{background:#e2e5e9;border-radius:4px}
.store-card{padding:12px 14px;border-radius:10px;cursor:pointer;transition:all .15s;margin-bottom:4px;border:1px solid transparent}
.store-card:hover{background:#e8f7f1}
.store-card.selected{background:#e8f7f1;border-color:#1D9E75}
.sc-top{display:flex;align-items:center;justify-content:space-between}
.sc-name{font-size:13px;font-weight:600;color:#1a1d21}
.sc-abbr{font-size:10px;font-weight:700;color:#0f6e4e;background:#e8f7f1;padding:3px 10px;border-radius:999px;letter-spacing:.5px}
.sc-addr{font-size:11px;color:#8b929a;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sc-badges{display:flex;gap:5px;margin-top:7px}
.sc-badge{font-size:10px;padding:3px 10px;border-radius:999px;font-weight:600}
.b-propria{background:#e8f7f1;color:#0f6e4e}
.b-franquia{background:rgba(230,126,34,.12);color:#e67e22}
.b-shopping{background:rgba(52,152,219,.1);color:#3498db}
.b-rua{background:#f7f8fa;color:#5a6068;border:1px solid #e2e5e9}
.b-dk{background:rgba(155,89,182,.1);color:#8e44ad}
.b-aeroporto{background:rgba(220,53,69,.1);color:#dc3545}
.sc-stats{display:flex;gap:16px;margin-top:7px;font-size:11px;color:#8b929a}
.sc-stats span strong{color:#5a6068;font-weight:600}
#map{width:100%;height:100%}
.leaflet-control-zoom a{background:#fff !important;color:#5a6068 !important;border-color:#e2e5e9 !important;font-weight:700}
.leaflet-control-zoom a:hover{background:#e8f7f1 !important;color:#0f6e4e !important}
.leaflet-popup-content-wrapper{background:#fff !important;color:#1a1d21 !important;border-radius:10px !important;box-shadow:0 1px 3px rgba(0,0,0,.05) !important;border:1px solid #e2e5e9 !important}
.leaflet-popup-tip{background:#fff !important}
.leaflet-popup-content{margin:14px 18px !important;font-family:'DM Sans',system-ui,sans-serif !important;font-size:13px;line-height:1.6}
.leaflet-popup-close-button{color:#8b929a !important;font-size:18px !important;top:6px !important;right:10px !important}
.leaflet-popup-close-button:hover{color:#1a1d21 !important}
.pop-header{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid #e2e5e9}
.pop-icon{width:36px;height:36px;border-radius:10px;background:#1D9E75;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:12px;color:#fff;flex-shrink:0}
.pop-name{font-weight:700;font-size:15px;color:#0f6e4e}
.pop-addr{font-size:11px;color:#8b929a;margin-top:1px}
.pop-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 20px}
.pop-item{display:flex;flex-direction:column}
.pop-label{font-size:10px;color:#8b929a;text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.pop-val{font-size:13px;font-weight:600;color:#1a1d21}
.legend{position:absolute;bottom:24px;left:16px;z-index:1000;background:rgba(255,255,255,.97);border:1px solid #e2e5e9;border-radius:10px;padding:14px 18px;font-size:11px;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.legend-title{font-weight:600;color:#8b929a;text-transform:uppercase;letter-spacing:.5px;font-size:10px;margin-bottom:8px}
.legend-item{display:flex;align-items:center;gap:8px;margin-bottom:5px;color:#5a6068}
.legend-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;border:2.5px solid #fff;box-shadow:0 1px 3px rgba(0,0,0,.18)}
.count-bar{padding:10px 20px;font-size:12px;color:#8b929a;border-top:1px solid #e2e5e9;background:#f7f8fa}
.count-bar strong{color:#0f6e4e}
.table-view{position:absolute;inset:0;background:#f7f8fa;display:flex;flex-direction:column;transition:opacity .2s;overflow:hidden}
.table-view.hidden{opacity:0;pointer-events:none}
.table-toolbar{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:#fff;border-bottom:1px solid #e2e5e9;flex-shrink:0}
.table-toolbar-left{display:flex;align-items:center;gap:14px}
.table-toolbar h3{font-size:11px;font-weight:600;color:#8b929a;text-transform:uppercase;letter-spacing:.5px}
.table-search{padding:4px 8px;border-radius:6px;border:1px solid #e2e5e9;background:#f7f8fa;font-family:inherit;font-size:13px;color:#1a1d21;outline:none;width:220px}
.table-search:focus{border-color:#1D9E75;background:#fff;box-shadow:0 0 0 2px rgba(29,158,117,.1)}
.tt-actions{display:flex;gap:8px}
.tt-btn{font-family:inherit;font-size:11px;font-weight:600;padding:8px 24px;border-radius:10px;border:1px solid #e2e5e9;background:#fff;color:#5a6068;cursor:pointer;transition:all .15s}
.tt-btn:hover{background:#e8f7f1;border-color:#1D9E75;color:#0f6e4e}
.tt-btn.primary{background:#1D9E75;color:#fff;border-color:#1D9E75}
.tt-btn.primary:hover{background:#0f6e4e}
.table-wrap{flex:1;overflow:auto;padding:0}
.table-wrap::-webkit-scrollbar{width:6px;height:6px}
.table-wrap::-webkit-scrollbar-thumb{background:#e2e5e9;border-radius:4px}
table.data-table{border-collapse:collapse;width:max-content;min-width:100%;font-size:11px}
table.data-table thead{position:sticky;top:0;z-index:5}
table.data-table th{background:#f5f7f9;color:#5a6068;font-weight:600;padding:8px 12px;text-align:left;white-space:nowrap;border-bottom:1px solid #e2e5e9;font-size:10px;letter-spacing:.4px;text-transform:uppercase}
table.data-table td{padding:6px 12px;border-top:1px solid #e2e5e9;white-space:nowrap;max-width:280px;overflow:hidden;text-overflow:ellipsis}
table.data-table tr:nth-child(even) td{background:#fafbfc}
table.data-table tr:hover td{background:#e8f7f1}
table.data-table td[contenteditable]:focus{outline:2px solid #1D9E75;outline-offset:-2px;background:#fff !important;border-radius:2px}
table.data-table td select{font-family:inherit;font-size:11px;border:none;background:transparent;outline:none;width:100%;color:inherit;padding:0;cursor:pointer}
table.data-table td select:focus{outline:2px solid #1D9E75;border-radius:2px}
.table-footer{padding:10px 20px;font-size:12px;color:#8b929a;border-top:1px solid #e2e5e9;background:#fff;flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.table-footer strong{color:#0f6e4e}
.toast{position:fixed;top:20px;right:20px;background:#1D9E75;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08);z-index:9999;opacity:0;transform:translateY(-10px);transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
.toast.err{background:#dc3545}
.sync-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:6px}
.sync-ok{background:#1D9E75}
.sync-loading{background:#e67e22;animation:pulse .8s infinite}
.sync-err{background:#dc3545}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@media(max-width:900px){
  .map-view{grid-template-columns:1fr}
  .sidebar{max-height:45vh;border-right:none;border-bottom:1px solid #e2e5e9}
  .kpi-strip{gap:14px}.kpi-val{font-size:17px}
  .topbar{padding:10px 16px;flex-wrap:wrap;gap:8px}
}
</style>
</head>

// ── SUPABASE FUNCTIONS ──
async function sbFetch(path,opts){
  var r=await fetch(SB_URL+'/rest/v1/'+path,Object.assign({headers:HDR},opts||{}));
  if(!r.ok){var t=await r.text();throw new Error(r.status+': '+t)}
  var txt=await r.text();return txt?JSON.parse(txt):[];
}
async function loadFromDB(){
  try{
    var data=await sbFetch('lojas?select=*&order=name');
    if(data.length===0){
      await sbFetch('lojas',{method:'POST',body:JSON.stringify(SEED)});
      data=await sbFetch('lojas?select=*&order=name');
    }
    stores=data;
    setSyncStatus('ok');
    showToast('Dados carregados do Supabase ('+stores.length+' lojas)');
  }catch(e){
    console.error('Supabase error:',e);
    stores=JSON.parse(JSON.stringify(SEED));
    setSyncStatus('err');
    showToast('Sem conexão com Supabase. Usando dados locais.','err');
  }
  initApp();
}
async function saveRow(s){
  if(!s.id)return;
  try{
    var body=Object.assign({},s);delete body.id;
    await sbFetch('lojas?id=eq.'+s.id,{method:'PATCH',body:JSON.stringify(body)});
  }catch(e){console.error('Save error:',e)}
}
async function insertRow(s){
  try{
    var body=Object.assign({},s);delete body.id;
    var res=await sbFetch('lojas',{method:'POST',body:JSON.stringify(body)});
    if(res&&res[0])return res[0];
  }catch(e){console.error('Insert error:',e)}
  return null;
}
async function saveAll(){
  setSyncStatus('loading');
  var errs=0;
  for(var i=0;i<stores.length;i++){
    try{
      if(stores[i].id){
        var body=Object.assign({},stores[i]);delete body.id;
        await sbFetch('lojas?id=eq.'+stores[i].id,{method:'PATCH',body:JSON.stringify(body)});
      }else{
        var res=await insertRow(stores[i]);
        if(res)stores[i]=res;
      }
    }catch(e){errs++;console.error(e)}
  }
  if(errs===0){setSyncStatus('ok');showToast('Todas as alterações salvas no Supabase!')}
  else{setSyncStatus('err');showToast(errs+' erro(s) ao salvar.','err')}
  refreshMap();
}

function setSyncStatus(s){
  var el=document.getElementById('syncStatus');
  el.innerHTML='<span class="sync-dot sync-'+s+'"></span>';
}
function showToast(msg,type){
  var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(type==='err'?' err':'');
  setTimeout(function(){t.className='toast'},3000);
}

// ── UI ──
function switchTab(t){
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active')});
  if(t==='map'){
    document.getElementById('mapView').classList.remove('hidden');
    document.getElementById('tableView').classList.add('hidden');
    document.querySelectorAll('.tab-btn')[0].classList.add('active');
    setTimeout(function(){map.invalidateSize()},100);
  }else{
    document.getElementById('mapView').classList.add('hidden');
    document.getElementById('tableView').classList.remove('hidden');
    document.querySelectorAll('.tab-btn')[1].classList.add('active');
    renderTable();
  }
}
function renderTable(){
  var q=(document.getElementById('tableSearch').value||'').toLowerCase();
  var html='<table class="data-table"><thead><tr>';
  colNames.forEach(function(c){html+='<th>'+c+'</th>'});
  html+='</tr></thead><tbody>';
  var count=0;
  stores.forEach(function(s,i){
    var searchStr=(s.name+s.bairro+s.city+s.abbr+(s.cluster||'')).toLowerCase();
    if(q&&!searchStr.includes(q))return;count++;
    html+='<tr>';
    cols.forEach(function(c){
      var v=s[c]!=null?s[c]:'';
      if(dropdowns[c]){
        html+='<td><select onchange="updateCell('+i+',\''+c+'\',this.value)">';
        dropdowns[c].forEach(function(opt){html+='<option'+(String(v)===opt?' selected':'')+'>'+opt+'</option>'});
        html+='</select></td>';
      }else{
        html+='<td contenteditable="true" onblur="updateCell('+i+',\''+c+'\',this.textContent)">'+v+'</td>';
      }
    });
    html+='</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('tableWrap').innerHTML=html;
  document.getElementById('tableFooter').innerHTML='<span><strong>'+count+'</strong> lojas exibidas</span><span style="font-size:11px;color:#c5c9c0">Edite nas células  |  Clique "Salvar Alterações" para persistir no Supabase</span>';
}
function updateCell(i,field,val){
  if(['lat','lng','m2','mesas','assentos','cozinhas'].indexOf(field)>=0){var n=parseFloat(val);if(!isNaN(n))val=n}
  stores[i][field]=val;
}
async function addRow(){
  var ns={status:"Planejada",cluster:"",cod:"",name:"Nova Loja",abbr:"NEW",cnpj:"",owner:"Própria",regional:"SP Oeste",reg_name:"",state:"SP",city:"",city_type:"Capital",bairro:"",address:"",cep:"",tipo:"Rua",lat:-23.55,lng:-46.65,m2:null,mesas:0,assentos:0,cozinhas:1,exp_dlv:"",turnos:"",obs:""};
  var res=await insertRow(ns);
  stores.push(res||ns);
  renderTable();
  var tw=document.getElementById('tableWrap');tw.scrollTop=tw.scrollHeight;
  showToast('Nova loja adicionada.');
}
function exportCSV(){
  var csv=colNames.join(';')+'\n';
  stores.forEach(function(s){csv+=cols.map(function(c){var v=s[c]!=null?String(s[c]):'';return v.includes(';')?'"'+v+'"':v}).join(';')+'\n'});
  var a=document.createElement('a');a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'}));a.download='cabana_cadastro_lojas.csv';a.click();
  showToast('CSV exportado!');
}

// ── MAP ──
function makeIcon(s){
  var c=colors[s.regional]||'#888';
  var st=s.status||'Ativa';
  var shape='',sz=34,anch=17;
  if(st==='Ativa'){
    shape='<div style="width:34px;height:34px;border-radius:50%;background:'+c+';border:3px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;transition:transform .2s;cursor:pointer" onmouseenter="this.style.transform=\'scale(1.2)\'" onmouseleave="this.style.transform=\'scale(1)\'"><span style="color:#fff;font-size:9px;font-weight:700;font-family:DM Sans,sans-serif">'+s.abbr+'</span></div>';
  } else if(st==='Inativa'){
    shape='<svg width="38" height="34" viewBox="0 0 38 34" style="filter:drop-shadow(0 2px 4px rgba(0,0,0,.22));cursor:pointer;transition:transform .2s" onmouseenter="this.style.transform=\'scale(1.2)\'" onmouseleave="this.style.transform=\'scale(1)\'"><polygon points="19,2 36,32 2,32" fill="'+c+'" stroke="#fff" stroke-width="3" opacity=".6"/><text x="19" y="25" text-anchor="middle" fill="#fff" font-size="8" font-weight="700" font-family="DM Sans,sans-serif">'+s.abbr+'</text></svg>';
    sz=38;anch=19;
  } else if(st==='Em obras'){
    shape='<div style="width:34px;height:34px;border-radius:6px;background:'+c+';border:3px dashed #fff;box-shadow:0 2px 8px rgba(0,0,0,.22);display:flex;align-items:center;justify-content:center;opacity:.75;transition:transform .2s;cursor:pointer" onmouseenter="this.style.transform=\'scale(1.2)\'" onmouseleave="this.style.transform=\'scale(1)\'"><span style="color:#fff;font-size:9px;font-weight:700;font-family:DM Sans,sans-serif">'+s.abbr+'</span></div>';
  } else if(st==='Planejada'){
    shape='<div style="width:34px;height:34px;border-radius:50%;background:transparent;border:3px dashed '+c+';box-shadow:0 2px 8px rgba(0,0,0,.1);display:flex;align-items:center;justify-content:center;transition:transform .2s;cursor:pointer" onmouseenter="this.style.transform=\'scale(1.2)\'" onmouseleave="this.style.transform=\'scale(1)\'"><span style="color:'+c+';font-size:9px;font-weight:700;font-family:DM Sans,sans-serif">'+s.abbr+'</span></div>';
  }
  return L.divIcon({className:'',iconSize:[sz,sz],iconAnchor:[anch,anch],popupAnchor:[0,-anch],html:shape});
}
function makePopup(s){
  var cl=s.cluster?'<div class="pop-item"><span class="pop-label">Cluster</span><span class="pop-val">'+s.cluster+'</span></div>':'';
  return '<div class="pop-header"><div class="pop-icon">'+s.abbr+'</div><div><div class="pop-name">'+s.name+'</div><div class="pop-addr">'+s.address+'</div></div></div><div class="pop-grid"><div class="pop-item"><span class="pop-label">Status</span><span class="pop-val">'+s.status+'</span></div><div class="pop-item"><span class="pop-label">Bairro</span><span class="pop-val">'+s.bairro+'</span></div><div class="pop-item"><span class="pop-label">Cidade</span><span class="pop-val">'+s.city+'</span></div><div class="pop-item"><span class="pop-label">Modelo</span><span class="pop-val">'+s.owner+'</span></div><div class="pop-item"><span class="pop-label">Tipo</span><span class="pop-val">'+s.tipo+'</span></div><div class="pop-item"><span class="pop-label">Metragem</span><span class="pop-val">'+(s.m2||'—')+' m²</span></div><div class="pop-item"><span class="pop-label">Regional</span><span class="pop-val">'+s.regional+'</span></div>'+cl+'<div class="pop-item"><span class="pop-label">Mesas</span><span class="pop-val">'+s.mesas+'</span></div><div class="pop-item"><span class="pop-label">Assentos</span><span class="pop-val">'+s.assentos+'</span></div></div>';
}
function refreshMap(){
  markers.forEach(function(o){map.removeLayer(o.marker)});markers=[];
  stores.forEach(function(s){
    var m=L.marker([s.lat,s.lng],{icon:makeIcon(s)}).addTo(map);
    m.bindPopup(makePopup(s),{maxWidth:300});markers.push({marker:m,store:s});
  });
  updateKPIs(stores);renderMapList(stores);

function updateKPIs(list){
  document.getElementById('k-total').textContent=list.length;
  document.getElementById('k-own').textContent=list.filter(function(s){return s.owner==='Própria'}).length;
  document.getElementById('k-fran').textContent=list.filter(function(s){return s.owner==='Franquia'}).length;
  var states=new Set(list.map(function(s){return s.state}));
  document.getElementById('k-states').textContent=states.size;
}
var activeMapFilter='Todas';
function applyMapFilter(f){
  activeMapFilter=f;
  var q=document.getElementById('search').value.toLowerCase();
  var visible=stores.slice();
  if(f==='Ativa'||f==='Inativa'||f==='Em obras'||f==='Planejada')visible=stores.filter(function(s){return s.status===f});
  else if(f==='SP Oeste')visible=stores.filter(function(s){return s.regional==='SP Oeste'});
  else if(f==='SP Leste/Norte')visible=stores.filter(function(s){return s.regional==='SP Leste/Norte'});
  else if(f==='SP Sul')visible=stores.filter(function(s){return s.regional==='SP Sul'});
  else if(f==='RJ')visible=stores.filter(function(s){return s.regional==='RJ'});
  else if(f==='Franquia')visible=stores.filter(function(s){return s.regional==='Franquia'});
  else if(f==='Própria')visible=stores.filter(function(s){return s.owner==='Própria'});
  else if(f==='Shopping')visible=stores.filter(function(s){return s.tipo==='Shopping'});
  else if(f==='Rua')visible=stores.filter(function(s){return s.tipo==='Rua'});
  else if(f==='Aeroporto')visible=stores.filter(function(s){return s.tipo==='Aeroporto'});
  if(q)visible=visible.filter(function(s){return(s.name+s.bairro+s.city+s.abbr).toLowerCase().includes(q)});
  var vn=new Set(visible.map(function(s){return s.name}));
  markers.forEach(function(o){if(vn.has(o.store.name))o.marker.addTo(map);else map.removeLayer(o.marker)});
  updateKPIs(visible);
  document.getElementById('count-bar').innerHTML='Exibindo <strong>'+visible.length+'</strong> de '+stores.length+' unidades';
  if(visible.length>0)map.fitBounds(L.latLngBounds(visible.map(function(s){return[s.lat,s.lng]})),{padding:[50,50],maxZoom:13});
  renderMapList(visible);
  setTimeout(updateMapCounter,300);
}
function renderMapList(list){
  var el=document.getElementById('store-list');el.innerHTML='';
  list.sort(function(a,b){return a.name.localeCompare(b.name)});
  list.forEach(function(s){
    var c=document.createElement('div');c.className='store-card';
    var ob=s.owner==='Própria'?'b-propria':'b-franquia';
    var tb=s.tipo==='Shopping'?'b-shopping':s.tipo==='Rua'?'b-rua':s.tipo==='Aeroporto'?'b-aeroporto':'b-dk';
    var stB=s.status==='Ativa'?'':'<span class="sc-badge" style="background:'+(s.status==='Inativa'?'#fdecea;color:#c0392b':s.status==='Em obras'?'#fef4e0;color:#8a5a0a':'#e8f0fc;color:#1a5ab8')+'">'+s.status+'</span>';
    var clB=s.cluster?'<span class="sc-badge" style="background:#eef8f3;color:#0f6e4e;font-weight:700">'+s.cluster+'</span>':'';
    c.innerHTML='<div class="sc-top"><span class="sc-name">'+s.name+'</span><span class="sc-abbr">'+s.abbr+'</span></div><div class="sc-addr">'+s.address+' — '+s.bairro+', '+s.city+'</div><div class="sc-badges"><span class="sc-badge '+ob+'">'+s.owner+'</span><span class="sc-badge '+tb+'">'+s.tipo+'</span>'+stB+clB+'</div><div class="sc-stats"><span><strong>'+(s.m2||'—')+'</strong> m²</span><span><strong>'+s.mesas+'</strong> mesas</span><span><strong>'+s.assentos+'</strong> lugares</span></div>';
    c.onclick=function(){
      document.querySelectorAll('.store-card').forEach(function(x){x.classList.remove('selected')});
      c.classList.add('selected');map.setView([s.lat,s.lng],16);
      var found=markers.find(function(m){return m.store.name===s.name});
      if(found)found.marker.openPopup();
    };
    el.appendChild(c);
  });
}

// ── RAIO DE ATUAÇÃO + ANÁLISE DE SOBREPOSIÇÃO ──
var radiusCircles=[];
var activeRadius=0;

function distKm(lat1,lng1,lat2,lng2){
  var R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  var a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)*Math.sin(dLng/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function toggleRadius(km){
  console.log('toggleRadius called with km='+km+', stores count='+stores.length);
  var btn3=document.getElementById('btnR3'),btn5=document.getElementById('btnR5');
  // Clear existing
  radiusCircles.forEach(function(c){map.removeLayer(c)});
  radiusCircles=[];
  btn3.style.background='';btn3.style.color='';btn3.style.borderColor='';
  btn5.style.background='';btn5.style.color='';btn5.style.borderColor='';

  if(activeRadius===km){activeRadius=0;document.getElementById('overlapPanel').style.display='none';return}
  activeRadius=km;
  var btn=km===3?btn3:btn5;
  btn.style.background='#1D9E75';btn.style.color='#fff';btn.style.borderColor='#1D9E75';

  // Use stores or fallback to SEED
  var src=stores.length>0?stores:SEED;
  var activeStores=src.filter(function(s){return s.status==='Ativa'});
  console.log('Drawing circles for '+activeStores.length+' active stores');
  var clrs={Franquia:'#e67e22','RJ':'#9b59b6','SP Leste/Norte':'#2563eb','SP Oeste':'#1D9E75','SP Sul':'#e74c3c'};

  // Draw Cabana circles
  activeStores.forEach(function(s){
    var c=L.circle([s.lat,s.lng],{radius:km*1000,color:clrs[s.regional]||'#888',weight:2.5,fillColor:clrs[s.regional]||'#888',fillOpacity:.1,dashArray:'8,5'}).addTo(map);
    c.bringToBack();
    radiusCircles.push(c);
  });

  // Cabana x Cabana overlap analysis
  var cabanaOverlaps=[];
  for(var i=0;i<activeStores.length;i++){
    for(var j=i+1;j<activeStores.length;j++){
      var d=distKm(activeStores[i].lat,activeStores[i].lng,activeStores[j].lat,activeStores[j].lng);
      if(d<km*2){
        cabanaOverlaps.push({a:activeStores[i].name,b:activeStores[j].name,dist:d});
      }
    }
  }

  // Cabana x Bullguer overlap analysis per Cabana store
  var bgOverlap={};
  activeStores.forEach(function(s){bgOverlap[s.name]=0});
  activeStores.forEach(function(s){
    bullguerStores.forEach(function(bg){
      var d=distKm(s.lat,s.lng,bg.lat,bg.lng);
      if(d<km) bgOverlap[s.name]++;
    });
  });

  // Classify: alta (3+), media (1-2), nenhuma (0)
  var alta=[],media=[],nenhuma=[];
  activeStores.forEach(function(s){
    var n=bgOverlap[s.name];
    if(n>=3)alta.push({name:s.name,count:n});
    else if(n>=1)media.push({name:s.name,count:n});
    else nenhuma.push(s.name);
  });

  // Build panel
  var html='';

  // Cabana x Cabana
  if(cabanaOverlaps.length>0){
    html+='<div style="font-weight:700;color:#0f6e4e;margin-bottom:4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Sobreposição Cabana × Cabana</div>';
    cabanaOverlaps.sort(function(a,b){return a.dist-b.dist});
    cabanaOverlaps.forEach(function(o){
      html+='<div style="display:flex;justify-content:space-between;padding:2px 0;border-bottom:1px solid #eef0ec"><span>'+o.a+' × '+o.b+'</span><span style="font-weight:600;color:#e74c3c">'+o.dist.toFixed(1)+' km</span></div>';
    });
    html+='<div style="margin-top:2px;margin-bottom:8px;font-size:10px;color:#9ea39a">'+cabanaOverlaps.length+' par(es) com sobreposição no raio de '+km+' km</div>';
  }else{
    html+='<div style="font-weight:700;color:#0f6e4e;margin-bottom:4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Sobreposição Cabana × Cabana</div>';
    html+='<div style="color:#9ea39a;margin-bottom:8px">Nenhuma sobreposição no raio de '+km+' km</div>';
  }

  // Cabana x Bullguer
  html+='<div style="border-top:1px solid #eef0ec;padding-top:6px;font-weight:700;color:#0f6e4e;margin-bottom:4px;font-size:10px;text-transform:uppercase;letter-spacing:.5px">Concorrência Bullguer (raio '+km+' km)</div>';
  if(alta.length>0){
    html+='<div style="margin-bottom:4px"><span style="display:inline-block;padding:1px 8px;border-radius:8px;background:#fdecea;color:#c0392b;font-weight:600;font-size:10px">Alta</span> '+alta.length+' loja(s)</div>';
    alta.forEach(function(o){html+='<div style="padding:1px 0;color:#c0392b">• '+o.name+' <span style="font-weight:600">('+o.count+' Bullguer)</span></div>'});
  }
  if(media.length>0){
    html+='<div style="margin-bottom:4px;margin-top:4px"><span style="display:inline-block;padding:1px 8px;border-radius:8px;background:#fef4e0;color:#8a5a0a;font-weight:600;font-size:10px">Média</span> '+media.length+' loja(s)</div>';
    media.forEach(function(o){html+='<div style="padding:1px 0;color:#8a5a0a">• '+o.name+' <span style="font-weight:600">('+o.count+' Bullguer)</span></div>'});
  }
  if(nenhuma.length>0){
    html+='<div style="margin-bottom:4px;margin-top:4px"><span style="display:inline-block;padding:1px 8px;border-radius:8px;background:#daf2e8;color:#0f6e4e;font-weight:600;font-size:10px">Nenhuma</span> '+nenhuma.length+' loja(s)</div>';
    html+='<div style="padding:1px 0;color:#0f6e4e">'+nenhuma.join(', ')+'</div>';
  }

  document.getElementById('overlapContent').innerHTML=html;
  document.getElementById('overlapPanel').style.display='block';
  showToast('Raio de '+km+' km ativado — '+cabanaOverlaps.length+' sobreposições Cabana, '+alta.length+' alta concorrência Bullguer');
}

  document.getElementById('overlapPanel').style.display='none';
}
