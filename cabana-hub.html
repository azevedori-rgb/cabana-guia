<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif;
    background: #FFFFFF;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 0 40px;
  }

  /* Topbar */
  .topbar {
    width: 100%;
    padding: 14px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 1px solid #F2F2F7;
  }

  .topbar-left { display: flex; align-items: center; gap: 10px; }

  .topbar-left .dot {
    width: 7px; height: 7px;
    background: #34C759;
    border-radius: 50%;
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .topbar-left span, .topbar-right {
    font-size: 12px; font-weight: 500; color: #8E8E93;
  }

  /* Hero — SVG logo */
  .hero {
    text-align: center;
    padding: 24px 24px 16px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

  .hero svg.hub-logo {
    width: 360px;
    height: auto;
  }

  /* Main content */
  .main {
    width: 100%;
    max-width: 1000px;
    padding: 0 28px;
  }

  .section-label {
    font-size: 11px;
    font-weight: 600;
    color: #8E8E93;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 14px;
    animation: fadeUp 0.6s ease 0.1s both;
  }

  /* Groups row — side by side */
  .groups-row {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 14px;
    margin-bottom: 14px;
    animation: fadeUp 0.6s ease 0.15s both;
  }

  .group-card {
    background: #F9FAFB;
    border-radius: 20px;
    padding: 18px;
    border: 1px solid #F0F0F5;
  }

  .group-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 14px;
    padding-bottom: 10px;
    border-bottom: 1px solid #EDEDF0;
  }

  .group-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .group-header h2 {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: -0.2px;
    color: #1D1D1F;
  }

  .group-items {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 10px;
  }

  /* Single item group — center the tile */
  .group-items.single {
    grid-template-columns: 1fr;
    max-width: 50%;
  }

  /* App tile inside group */
  .app-tile {
    background: #FFFFFF;
    border-radius: 16px;
    padding: 20px 14px 16px;
    text-decoration: none;
    color: #1D1D1F;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    transition: all 0.3s cubic-bezier(0.25,1,0.5,1);
    cursor: pointer;
    border: 1px solid #F0F0F5;
  }

  .app-tile:hover {
    transform: scale(1.04);
    box-shadow: 0 6px 20px rgba(0,0,0,0.06);
    border-color: transparent;
  }

  .app-tile:active { transform: scale(0.97); }

  .app-icon {
    width: 52px; height: 52px;
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
  }

  .app-icon svg {
    width: 26px; height: 26px;
    stroke-width: 1.6;
    stroke-linecap: round;
    stroke-linejoin: round;
    fill: none;
    stroke: white;
  }

  .app-name {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: -0.1px;
    line-height: 1.25;
    margin-bottom: 2px;
  }

  .app-subtitle {
    font-size: 10px;
    color: #8E8E93;
    line-height: 1.3;
  }

  /* Gradients */
  .bg-green { background: linear-gradient(135deg, #34A853, #2E7D32); }
  .bg-emerald { background: linear-gradient(135deg, #10B981, #059669); }
  .bg-teal { background: linear-gradient(135deg, #14B8A6, #0D9488); }
  .bg-lime { background: linear-gradient(135deg, #84CC16, #65A30D); }
  .bg-sage { background: linear-gradient(135deg, #6B8F71, #4A7C59); }
  .bg-mint { background: linear-gradient(135deg, #00C896, #00A67E); }

  .dot-green { background: #34A853; }
  .dot-teal { background: #14B8A6; }

  /* Divider */
  .divider {
    height: 1px;
    background: #EDEDF0;
    margin: 20px 0 10px;
  }

  /* Em breve grid */
  .soon-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    animation: fadeUp 0.6s ease 0.25s both;
  }

  .soon-card {
    background: #F9FAFB;
    border-radius: 16px;
    padding: 20px 14px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    opacity: 0.45;
    border: 1px solid #F0F0F5;
  }

  .soon-card .app-icon {
    background: linear-gradient(135deg, #C7C7CC, #AEAEB2) !important;
  }

  .soon-badge {
    font-size: 8px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #AEAEB2;
    background: #EDEDF0;
    padding: 2px 7px;
    border-radius: 5px;
    margin-top: 6px;
  }

  /* Footer */
  footer {
    margin-top: 28px;
    text-align: center;
  }

  footer img { height: 24px; opacity: 0.25; }
  footer p { font-size: 10px; color: #AEAEB2; margin-top: 6px; }

  /* Mobile */
  @media (max-width: 700px) {
    .groups-row { grid-template-columns: 1fr; }
    .group-items.single { max-width: 100%; }
    .soon-grid { grid-template-columns: 1fr 1fr; }
    .topbar { padding: 12px 20px; }
    .main { padding: 0 16px; }
    .hero { padding: 20px 16px 14px; }
    .hero img.logo-vertical { width: 44px; }
    .hero h1 { font-size: 22px; }
  }

  @media (max-width: 420px) {
    .group-items { grid-template-columns: 1fr; }
    .group-items.single { max-width: 100%; }
    .soon-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

</html>
