function log(msg, cls) {
  const el = document.getElementById('log');
  const div = document.createElement('div');
  div.className = cls || '';
  div.textContent = msg;
  el.appendChild(div);
  el.scrollTop = el.scrollHeight;
}

async function doImport() {
  const btn = document.getElementById('btnImport');
  btn.disabled = true;
  btn.textContent = 'Importando...';

  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // 1) Verifica se a tabela está mesmo vazia (segurança)
  log('Verificando tabela projetos_hub...');
  const { count, error: countErr } = await sb.from('projetos_hub').select('*', { count: 'exact', head: true });
  if (countErr) { log('Erro ao verificar: ' + countErr.message, 'err'); btn.disabled = false; btn.textContent = '▶ Tentar de novo'; return; }
  log('Tabela atualmente tem ' + count + ' registros', 'ok');

  if (count > 0) {
    if (!confirm('A tabela já tem ' + count + ' registros. Continuar mesmo assim? (Cancelar = parar)')) {
      log('Cancelado pelo usuário.');
      btn.disabled = false; btn.textContent = '▶ Restaurar agora';
      return;
    }
  }

  // 2) Insere projetos (em lotes de 10 pra não estourar limite)
  log('Inserindo ' + PROJECTS.length + ' projetos...');
  let inseridos = 0, erros = 0;
  for (let i = 0; i < PROJECTS.length; i += 10) {
    const lote = PROJECTS.slice(i, i + 10);
    const { data, error } = await sb.from('projetos_hub').insert(lote).select();
    if (error) {
      log('Erro no lote ' + (i/10+1) + ': ' + error.message, 'err');
      erros += lote.length;
    } else {
      inseridos += data.length;
      log('Lote ' + (i/10+1) + ': ' + data.length + ' projetos OK', 'ok');
    }
  }

  // 3) Insere as pessoas via projetos_hub_settings
  log('Salvando pessoas (' + Object.keys(PEOPLE).length + ')...');
  const { error: peopleErr } = await sb.from('projetos_hub_settings').upsert({
    key: 'people',
    value: PEOPLE
  }, { onConflict: 'key' });
  if (peopleErr) {
    log('Erro ao salvar pessoas: ' + peopleErr.message, 'err');
    log('(Não tem problema — você pode recadastrar manualmente nas Configurações)', '');
  } else {
    log('Pessoas salvas ✓', 'ok');
  }

  log('---');
  log('FINALIZADO: ' + inseridos + ' projetos restaurados, ' + erros + ' erros', inseridos === PROJECTS.length ? 'ok' : 'err');
  log('Agora abre https://azevedori-rgb.github.io/cabana-guia/projetos-hub.html e confere se os projetos voltaram!');
  btn.textContent = '✓ Concluído';
}
